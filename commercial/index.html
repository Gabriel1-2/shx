<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHX — The Next Era</title>
    <!-- Premium Futuristic Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div id="hud-container">
        <canvas id="hud-canvas"></canvas>
    </div>

    <!-- WebGL Canvas for 250k Particles -->
    <canvas id="gl-canvas"></canvas>

    <!-- Invisible Canvas for Text/Logo Sampling -->
    <canvas id="sampler-canvas" style="display:none;"></canvas>

    <div id="crt"></div>
    <div id="flash"></div> <!-- For Mega Impacts -->
    
    <div id="start">
        <button class="btn" id="start-btn">INITIALIZE SYSTEM</button>
        <div class="sub">AUDIO REQUIRED</div>
    </div>
    
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error("ERROR: " + msg + "\nLine: " + lineNo + "\n" + (error ? error.stack : ''));
            return false;
        };
    </script>
    <script type="module" src="js/main.js?v=13"></script>
</body>
</html>
