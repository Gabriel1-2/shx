<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHX — The Next Era</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    
    <div id="hud-container">
        <canvas id="hud-canvas"></canvas>
    </div>

    <!-- WebGL Canvas for 250k Particles -->
    <canvas id="gl-canvas"></canvas>

    <!-- Invisible Canvas for Text/Logo Sampling -->
    <canvas id="sampler-canvas" style="display:none;"></canvas>

    <div id="crt"></div>
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            const errDiv = document.createElement('div');
            errDiv.style.position = 'absolute';
            errDiv.style.top = '10px';
            errDiv.style.left = '10px';
            errDiv.style.color = 'red';
            errDiv.style.zIndex = '999999';
            errDiv.style.background = 'black';
            errDiv.style.padding = '10px';
            errDiv.innerText = "ERROR: " + msg + "\nLine: " + lineNo + "\n" + (error ? error.stack : '');
            document.body.appendChild(errDiv);
            return false;
        };
        window.addEventListener("unhandledrejection", function(event) {
            const errDiv = document.createElement('div');
            errDiv.style.position = 'absolute';
            errDiv.style.top = '100px';
            errDiv.style.left = '10px';
            errDiv.style.color = 'red';
            errDiv.style.zIndex = '999999';
            errDiv.style.background = 'black';
            errDiv.style.padding = '10px';
            errDiv.innerText = "PROMISE ERROR: " + event.reason;
            document.body.appendChild(errDiv);
        });
    </script>
    <script type="module" src="js/main.js?v=12"></script>
</body>
</html>
