<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHX — The Next Era</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body,html{width:100vw;height:100vh;background:#010302;overflow:hidden;font-family:'Courier New',Courier,monospace}
canvas{display:block;position:absolute;top:0;left:0;z-index:10}
#crt{position:absolute;inset:0;z-index:50;pointer-events:none}
#crt::before{content:"";position:absolute;inset:0;background:linear-gradient(rgba(0,0,0,0) 50%,rgba(0,0,0,0.4) 50%);background-size:100% 3px}
#crt::after{content:"";position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,0,0.95) 100%)}
#flash{position:absolute;inset:0;z-index:40;pointer-events:none;opacity:0;mix-blend-mode:screen}
#start{position:absolute;inset:0;z-index:100;background:#010302;display:flex;align-items:center;justify-content:center;flex-direction:column}
.btn{border:1px solid #2FF36A;padding:18px 50px;font-size:20px;font-weight:bold;font-family:inherit;color:#2FF36A;background:rgba(47,243,106,0.03);text-transform:uppercase;cursor:pointer;letter-spacing:5px;transition:all 0.4s}
.btn:hover{background:#2FF36A;color:#010302;box-shadow:0 0 60px rgba(47,243,106,0.5),0 0 120px rgba(47,243,106,0.2);transform:scale(1.06)}
.sub{margin-top:18px;font-size:11px;opacity:0.4;color:#1CA478;letter-spacing:4px}
</style>
</head>
<body>
<div id="start"><button class="btn">Initialize</button><div class="sub">FULL VOLUME REQUIRED</div></div>
<canvas id="c"></canvas>
<div id="crt"></div>
<div id="flash"></div>
<script>
const FL=document.getElementById('flash');
const C=document.getElementById('c');
const X=C.getContext('2d',{alpha:false});
const FS=13;
let cols=0,rows=0,grid,zB,cw=0,chH=FS*1.15;
let time=0,lastT=0,running=false;

// ── EFFECTS STATE ──
let glitch=false,glitchSlices=[],screenPulse=0,shX=0,shY=0,shI=0,camZoom=550;

// ── AUDIO ──
let AC,MG,REV;
function initA(){
    AC=new(window.AudioContext||window.webkitAudioContext)();
    MG=AC.createGain();MG.gain.value=0.5;MG.connect(AC.destination);
    let l=AC.sampleRate*3,b=AC.createBuffer(2,l,AC.sampleRate);
    for(let c=0;c<2;c++){let d=b.getChannelData(c);for(let i=0;i<l;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/l,4);}
    REV=AC.createConvolver();REV.buffer=b;REV.connect(MG);
}
function O(f,t,d,v,r){if(!AC)return;let o=AC.createOscillator(),g=AC.createGain();o.type=t;o.frequency.setValueAtTime(f,AC.currentTime);g.gain.setValueAtTime(v,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+d);o.connect(g);g.connect(r?REV:MG);o.start();o.stop(AC.currentTime+d);}
function noise(d=0.25,v=0.4){if(!AC)return;let s=AC.sampleRate*d,b=AC.createBuffer(1,s,AC.sampleRate),dd=b.getChannelData(0);for(let i=0;i<s;i++)dd[i]=(Math.random()*2-1)*Math.pow(1-i/s,6);let src=AC.createBufferSource();src.buffer=b;let g=AC.createGain();g.gain.value=v;src.connect(g);g.connect(MG);src.start();}
function kick(){O(90,'sine',1.2,1);O(50,'sine',0.6,0.7);noise(0.12,0.3);}
function subDrop(){if(!AC)return;let o=AC.createOscillator(),g=AC.createGain();o.frequency.setValueAtTime(250,AC.currentTime);o.frequency.exponentialRampToValueAtTime(15,AC.currentTime+3);g.gain.setValueAtTime(0.9,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+3);o.connect(g);g.connect(MG);o.start();o.stop(AC.currentTime+3);}
function impact(){kick();subDrop();noise(0.6,0.6);shI=35;doFlash('#2FF36A');burstParticles();}
function megaImpact(){kick();subDrop();noise(0.8,0.8);shI=55;doFlash('#ffffff');burstParticles();
    // Arpeggio
    let notes=[110,165,220,330,440,660];
    notes.forEach((n,i)=>{setTimeout(()=>O(n,'sine',2,0.08,true),i*60);});
}
function ping(){O(800,'sine',0.8,0.05,true);O(1200,'sine',0.4,0.03,true);}
function riser(d){if(!AC)return;let o=AC.createOscillator(),g=AC.createGain();o.type='sawtooth';o.frequency.setValueAtTime(25,AC.currentTime);o.frequency.exponentialRampToValueAtTime(2000,AC.currentTime+d);g.gain.setValueAtTime(0.003,AC.currentTime+d*0.5);g.gain.linearRampToValueAtTime(0.3,AC.currentTime+d);o.connect(g);g.connect(REV);o.start();o.stop(AC.currentTime+d);}
function chord(){O(110,'sine',7,0.15,true);O(165,'sine',7,0.15,true);O(220,'sine',7,0.15,true);O(330,'sine',6,0.1,true);O(440,'sine',5,0.06,true);}
function typ(){O(200+Math.random()*600,'square',0.02,0.008);}

let droneOn=false;
function startDrone(){if(!AC||droneOn)return;droneOn=true;let g=AC.createGain();g.gain.value=0;g.connect(REV);let o1=AC.createOscillator();o1.type='sine';o1.frequency.value=40;o1.connect(g);o1.start();let o2=AC.createOscillator();o2.type='sine';o2.frequency.value=60;o2.connect(g);o2.start();g.gain.linearRampToValueAtTime(0.06,AC.currentTime+10);}

function doFlash(col){FL.style.background=col;FL.style.opacity='0.7';setTimeout(()=>FL.style.opacity='0.25',30);setTimeout(()=>FL.style.opacity='0.08',80);setTimeout(()=>FL.style.opacity='0',180);}

// Voice
let vQ=[];function say(t,d){vQ.push({t,d,done:false});}
function procV(){if(!window.speechSynthesis)return;for(let v of vQ){if(!v.done&&time>=v.d){v.done=true;let u=new SpeechSynthesisUtterance(v.t);u.rate=0.8;u.pitch=0.15;u.volume=1;let vs=speechSynthesis.getVoices();let pk=vs.find(v=>v.name.includes('Google')&&v.lang.startsWith('en'))||vs.find(v=>v.lang.startsWith('en'));if(pk)u.voice=pk;speechSynthesis.speak(u);}}}

// ── GRID ──
function resize(){
    C.width=innerWidth*devicePixelRatio;C.height=innerHeight*devicePixelRatio;
    C.style.width=innerWidth+'px';C.style.height=innerHeight+'px';
    X.scale(devicePixelRatio,devicePixelRatio);
    X.font=`bold ${FS}px 'Courier New',Courier,monospace`;
    cw=X.measureText('M').width;
    cols=Math.floor(innerWidth/cw);rows=Math.floor(innerHeight/chH);
    grid=new Array(rows*cols);zB=new Float32Array(rows*cols);
    for(let i=0;i<grid.length;i++)grid[i]={c:' ',o:1,co:null};
}
function clr(){for(let i=0;i<grid.length;i++){grid[i].c=' ';grid[i].co=null;zB[i]=1e5;}glitch=false;glitchSlices=[];}

function shxC(x,y,o){let t=((x/cols)+(y/rows))/2;return`rgba(${47*(1-t)+20*t|0},${243*(1-t)+180*t|0},${106*(1-t)+130*t|0},${o})`;}

function p3(x,y,z,c,o=1,co=null){let px=x|0,py=y|0;if(px<0||px>=cols||py<0||py>=rows)return;let i=py*cols+px;if(z<zB[i]){zB[i]=z;grid[i].c=c;grid[i].o=o;grid[i].co=co;}}
function pt(x,y,t,o=1,co=null){x|=0;y|=0;if(y<0||y>=rows)return;for(let i=0;i<t.length;i++){let px=x+i;if(px>=0&&px<cols){let idx=y*cols+px;zB[idx]=-200;grid[idx].c=t[i];grid[idx].o=o;grid[idx].co=co;}}}

function scr(x,y,text,sT,dur=1.2,co=null){
    if(time<sT)return;let e=time-sT,prog=Math.min(e/dur,1),res=Math.floor(prog*text.length);
    let chars='!@#$%^&*+-=|/<>?01234ABCDEFGXYZ';
    for(let i=0;i<text.length;i++){
        let c=i<res?text[i]:(e>0.02?chars[Math.random()*chars.length|0]:' ');
        let px=(x+i)|0;if(px>=0&&px<cols&&y>=0&&y<rows){let idx=y*cols+px;zB[idx]=-200;grid[idx].c=c;grid[idx].o=1;grid[idx].co=co;}
    }
    // Blinking cursor
    if(res<text.length&&res>0){
        let cux=(x+res)|0;
        if(cux>=0&&cux<cols){let idx=y*cols+cux;grid[idx].c=Math.floor(time*6)%2===0?'_':' ';grid[idx].o=1;grid[idx].co=co;}
        if(Math.floor(time*50)%3===0)typ();
    }
}

// Horizontal glitch slicing
function trigGlitch(){
    glitch=true;
    glitchSlices=[];
    for(let i=0;i<8;i++){
        glitchSlices.push({y:Math.random()*rows|0,h:2+Math.random()*6|0,off:(Math.random()-0.5)*60});
    }
}

function drawGrid(){
    let pulse=1+screenPulse*0.15;
    X.fillStyle='#010302';X.fillRect(0,0,innerWidth,innerHeight);
    X.textBaseline='top';X.save();X.translate(shX,shY);
    for(let y=0;y<rows;y++){
        // Glitch horizontal offset
        let rowOff=0;
        if(glitch){for(let s of glitchSlices){if(y>=s.y&&y<s.y+s.h)rowOff=s.off;}}
        for(let x=0;x<cols;x++){
            let i=y*cols+x,c=grid[i];
            if(c.c!==' '){
                let rx=x*cw+rowOff,ry=y*chH;
                let op=Math.min(c.o*pulse,1);
                let color=c.co?(c.co.startsWith('r')?c.co:`rgba(${c.co},${op})`):shxC(x,y,op);
                if(glitch&&Math.random()<0.03){
                    X.fillStyle=`rgba(255,10,10,${op})`;X.fillText(c.c,rx-5,ry);
                    X.fillStyle=`rgba(10,255,255,${op})`;X.fillText(c.c,rx+5,ry);
                }else{
                    X.fillStyle=color;X.fillText(c.c,rx,ry);
                    // Bloom
                    if(op>0.75&&c.c!=='.'&&c.c!==':'&&c.c!==' '){
                        X.globalAlpha=op*0.1;X.fillText(c.c,rx-1,ry);X.fillText(c.c,rx+1,ry);
                        X.fillText(c.c,rx,ry-1);X.fillText(c.c,rx,ry+1);X.globalAlpha=1;
                    }
                }
            }
        }
    }
    X.restore();
    screenPulse*=0.9;
}

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function rot3(x,y,z,p,yw,r){let cp=Math.cos(p),sp=Math.sin(p),y1=y*cp-z*sp,z1=y*sp+z*cp;let cy=Math.cos(yw),sy=Math.sin(yw),x2=x*cy+z1*sy,z2=-x*sy+z1*cy;let cr=Math.cos(r),sr=Math.sin(r);return{x:x2*cr-y1*sr,y:x2*sr+y1*cr,z:z2};}

// ── PARTICLES ──
const NP=6000;
let PP=[];
function initP(){for(let i=0;i<NP;i++)PP.push({x:(Math.random()-0.5)*600,y:(Math.random()-0.5)*600,z:(Math.random()-0.5)*600,vx:0,vy:0,vz:0,tx:0,ty:0,tz:0,ox:0,oy:0,c:['0','1','$','X','>','<','+','#','*','@','%','&'][Math.random()*12|0],co:null,st:0.012+Math.random()*0.02,dm:0.85+Math.random()*0.08});}

function burstParticles(){
    for(let p of PP){
        let dx=p.x,dy=p.y,dz=p.z;
        let len=Math.sqrt(dx*dx+dy*dy+dz*dz)||1;
        p.vx+=(dx/len)*15*(0.5+Math.random());
        p.vy+=(dy/len)*15*(0.5+Math.random());
        p.vz+=(dz/len)*15*(0.5+Math.random());
    }
}

// Shockwaves
let SW=[];
function addSW(){for(let i=0;i<300;i++){let a=Math.random()*6.283;SW.push({x:0,y:0,vx:Math.cos(a)*10,vy:Math.sin(a)*10,life:1,c:['#','$','*'][Math.random()*3|0]});}}

// Ambient
let amb=[];
function initAmb(){for(let i=0;i<300;i++)amb.push({x:Math.random()*cols,y:Math.random()*rows,s:0.06+Math.random()*0.2,c:['.',':','`','|'][Math.random()*4|0],o:Math.random()*0.1+0.02});}
function drawAmb(){for(let p of amb){p.y+=p.s;if(p.y>rows){p.y=0;p.x=Math.random()*cols;}let i=(p.y|0)*cols+(p.x|0);if(i>=0&&i<grid.length&&grid[i].c===' '){grid[i].c=p.c;grid[i].o=p.o+Math.sin(time*0.6+p.x)*0.02;}}}

// Perspective floor
function drawFloor(intensity=0.08){
    let cx=cols/2,horizon=rows*0.55;
    for(let z=1;z<35;z+=0.8){
        let sy=horizon+(rows-horizon)*(1-1/z);
        if(sy>=rows)continue;
        // Horizontal lines
        if(z%3<1){for(let x=0;x<cols;x+=4){p3(x,sy,z*20,'-',intensity*clamp(1-z/35,0,1));}}
        // Vertical lines projected
        for(let x=-25;x<25;x+=3){
            let px=cx+(x/z)*cx*0.8;
            p3(px,sy,z*20,'|',intensity*clamp(1-z/35,0,1));
        }
    }
}

let phase=-1,sF={};
function sn(id,t,fn){if(time>t&&!sF[id]){fn();sF[id]=true;}}

// ── LOGO ──
const LOGO=[
    "    ########       ##      ##     ##        ##",
    "   ##########      ##      ##      ##      ## ",
    "  ###      ###     ##      ##       ##    ##  ",
    "  ###              ##      ##        ##  ##   ",
    "   ########        ##########         ####    ",
    "    #########      ##########        ####     ",
    "          ####     ##      ##       ##  ##    ",
    "  ###     ####     ##      ##      ##    ##   ",
    "   ##########      ##      ##     ##      ##  ",
    "    ########       ##      ##    ##        ## ",
];

// ── TARGETS ──
function tChaos(){for(let p of PP){p.tx=(Math.random()-0.5)*600;p.ty=(Math.random()-0.5)*600;p.tz=(Math.random()-0.5)*600;p.co='255,50,50';p.st=0.02;p.dm=0.82;}}
function tHelix(){for(let i=0;i<NP;i++){let p=PP[i],t=(i/NP)*Math.PI*16,y=(i/NP)*700-350,r=60;p.tx=(i%2===0?Math.cos(t):Math.cos(t+Math.PI))*r;p.tz=(i%2===0?Math.sin(t):Math.sin(t+Math.PI))*r;p.ty=y;p.co=null;p.st=0.01+Math.random()*0.015;p.dm=0.88;}}
function tTorus(){let R=140,r=50;for(let i=0;i<NP;i++){let p=PP[i],th=Math.random()*6.283,ph=Math.random()*6.283;p.tx=(R+r*Math.cos(th))*Math.cos(ph);p.ty=(R+r*Math.cos(th))*Math.sin(ph);p.tz=r*Math.sin(th);p.co=null;p.st=0.008+Math.random()*0.014;p.dm=0.9;}}
function tSphere(){for(let i=0;i<NP;i++){let p=PP[i],th=Math.random()*6.283,ph=Math.acos(2*Math.random()-1),r=120;p.tx=r*Math.sin(ph)*Math.cos(th);p.ty=r*Math.sin(ph)*Math.sin(th);p.tz=r*Math.cos(ph);p.co=null;p.st=0.013+Math.random()*0.012;p.dm=0.87;}}
function tWave(){for(let i=0;i<NP;i++){let p=PP[i];p.tx=(Math.random()-0.5)*700;p.tz=(Math.random()-0.5)*700;p.ty=0;p.co=null;p.st=0.018+Math.random()*0.025;p.dm=0.84;}}
function tDiamond(){for(let i=0;i<NP;i++){let p=PP[i],r1=Math.random(),r2=Math.random(),r3=Math.random(),s=r1+r2+r3;p.tx=(r1/s)*200*(Math.random()>0.5?1:-1);p.ty=(r2/s)*200*(Math.random()>0.5?1:-1);p.tz=(r3/s)*200*(Math.random()>0.5?1:-1);p.co=null;p.st=0.013+Math.random()*0.01;p.dm=0.87;}}
function tMobius(){
    for(let i=0;i<NP;i++){let p=PP[i];
    let u=(i/NP)*Math.PI*2,v=(Math.random()-0.5)*40;
    let R=120;
    p.tx=(R+v*Math.cos(u/2))*Math.cos(u);
    p.ty=(R+v*Math.cos(u/2))*Math.sin(u);
    p.tz=v*Math.sin(u/2);
    p.co=null;p.st=0.015+Math.random()*0.01;p.dm=0.88;}
}
function tRing(){for(let i=0;i<NP;i++){let p=PP[i],th=(i/NP)*6.283,r=150+Math.random()*30;p.tx=Math.cos(th)*r;p.ty=Math.sin(th)*r;p.tz=(Math.random()-0.5)*15;p.co=null;p.st=0.018+Math.random()*0.015;p.dm=0.86;}}
function tWarp(){for(let p of PP){let a=Math.random()*6.283,r=500+Math.random()*1000;p.tx=Math.cos(a)*r;p.ty=Math.sin(a)*r;p.tz=-500-Math.random()*2500;p.st=0.035;p.dm=0.78;p.co=null;}}
function tLogo(){
    let pts=[];
    for(let r=0;r<LOGO.length;r++)for(let c=0;c<LOGO[r].length;c++)if(LOGO[r][c]==='#')pts.push({x:(c-LOGO[0].length/2)*3,y:(r-LOGO.length/2)*5.5});
    for(let i=0;i<NP;i++){let p=PP[i];
    if(i<pts.length){p.tx=pts[i].x;p.ty=pts[i].y;p.tz=0;p.c=['$','#','X','@','%','*'][Math.random()*6|0];}
    else{let th=Math.random()*6.283,r=220+Math.random()*180;p.tx=Math.cos(th)*r;p.ty=Math.sin(th)*r;p.tz=(Math.random()-0.5)*120;}
    p.co=null;p.st=0.022+Math.random()*0.018;p.dm=0.82;}
}

function updateP(cp,cy,cr){
    let cx2=cols/2|0,cy2=rows/2|0;
    if(phase===6){for(let p of PP)p.ty=Math.sin(p.tx*0.015+time*3)*50+Math.cos(p.tz*0.015+time*3)*50;}
    for(let p of PP){
        let ax=(p.tx-p.x)*p.st,ay=(p.ty-p.y)*p.st,az=(p.tz-p.z)*p.st;
        p.vx=(p.vx+ax)*p.dm;p.vy=(p.vy+ay)*p.dm;p.vz=(p.vz+az)*p.dm;
        p.x+=p.vx;p.y+=p.vy;p.z+=p.vz;
        let r=rot3(p.x,p.y,p.z,cp,cy,cr);
        let zS=camZoom/(camZoom+r.z);if(zS<0)continue;
        let px=cx2+r.x*zS*2,py=cy2+r.y*zS;
        let op=clamp(zS*1.8-0.5,0.02,1);
        // Trail
        if(p.ox!==undefined){let dx=px-p.ox,dy=py-p.oy,d=Math.sqrt(dx*dx+dy*dy);
        if(d>1.2&&d<60){for(let t=0.15;t<1;t+=0.15)p3(p.ox+dx*t,p.oy+dy*t,r.z+15,'.',op*0.18*(1-t),p.co);}}
        p.ox=px;p.oy=py;
        p3(px,py,r.z,p.c,op,p.co);
    }
    // Shockwaves
    for(let i=SW.length-1;i>=0;i--){let s=SW[i];s.x+=s.vx;s.y+=s.vy;s.life-=0.015;if(s.life<=0){SW.splice(i,1);continue;}p3(cx2+s.x*2,cy2+s.y,-300,s.c,s.life);}
}

function hud(){
    pt(cols-26,1,'SHX_TERMINAL v5.0.0',0.15);
    pt(cols-26,2,'BLK '+(2847300+Math.floor(time*12)),0.1);
    let s=time|0,m=s/60|0;s%=60;pt(cols-26,3,'T+'+String(m).padStart(2,'0')+':'+String(s|0).padStart(2,'0'),0.1);
    pt(2,1,'[ SHX ]',0.15);pt(2,2,'SOLANA MAINNET',0.1);
    // Beat indicator
    let beat=Math.sin(time*4)>0.8;if(beat){pt(2,3,'>>',0.3);screenPulse=0.4;}
}

// Animated counter
function counter(x,y,label,val,startT){
    if(time<startT)return;
    let e=time-startT,prog=clamp(e/1.5,0,1);
    let current=Math.floor(prog*val);
    let str=label+current.toLocaleString();
    pt(x,y,str,1);
}

// ── TIMELINE ──
function render(ts){
    if(!running)return;
    let dt=(ts-lastT)/1000;lastT=ts;time+=dt;
    clr();
    // Shake
    if(shI>0.5){shX=(Math.random()-0.5)*shI;shY=(Math.random()-0.5)*shI;shI*=0.86;}else{shX=0;shY=0;}
    procV();drawAmb();hud();
    let cx=cols/2|0,cy=rows/2|0;

    // 0: LEGACY (0-9)
    if(time<9){
        if(phase!==0){phase=0;tChaos();}
        camZoom=550;
        updateP(time*0.4,time*0.25,0);
        drawFloor(0.04);
        scr(cx-24,cy-6,"> SCANNING GLOBAL FINANCIAL INFRASTRUCTURE...",0.5,1.8,'255,100,100');
        scr(cx-24,cy-4,"> LEGACY EXCHANGE DETECTED ............. COINBASE",2,1.5,'255,100,100');
        scr(cx-24,cy-2,"> HIDDEN FEES ........................... 1.49%",3.5,1.5,'255,100,100');
        scr(cx-24,cy+0,"> CUSTODIAL RISK ........................ EXTREME",5,1.5,'255,100,100');
        scr(cx-24,cy+2,"> WITHDRAWALS .......................... DELAYED",6,1.5,'255,100,100');
        scr(cx-24,cy+4,"> SOLUTION FOUND. PURGING...",7.5,0.8);
        sn('a',0.5,ping);sn('b',2,ping);sn('c',3.5,ping);sn('d',5,ping);sn('e',7.5,()=>{kick();riser(1.5);});
        if(time>8){trigGlitch();screenPulse=1;}
    }
    // 1: HELIX (9-22)
    else if(time<22){
        if(phase!==1){phase=1;tHelix();impact();addSW();}
        camZoom=500+Math.sin(time*0.3)*50;
        updateP(time*0.1,time*0.3,time*0.04);
        drawFloor(0.05);
        scr(cx-17,cy-Math.floor(rows*0.42),"T H E   N E X T   E R A",10,2,'255,255,255');
        scr(cx-17,cy-Math.floor(rows*0.42)+2,"OF  DIGITAL  ASSETS",11,1.5,'255,255,255');
        scr(cx-16,cy+Math.floor(rows*0.26),"BLOCKCHAIN ............ SOLANA",14,1.0);
        scr(cx-16,cy+Math.floor(rows*0.26)+2,"FEES .................. 0 BPS",16,1.0);
        scr(cx-16,cy+Math.floor(rows*0.26)+4,"CUSTODY ............... YOURS",18,1.0);
        scr(cx-16,cy+Math.floor(rows*0.26)+6,"SETTLEMENT ............ INSTANT",20,1.0);
        sn('f',10,ping);sn('g',14,ping);sn('h',16,ping);sn('i',18,ping);sn('j',20,ping);
    }
    // 2: TORUS / JUPITER (22-36)
    else if(time<36){
        if(phase!==2){phase=2;tTorus();impact();addSW();}
        camZoom=450+Math.sin(time*0.5)*80; // zoom pulse
        updateP(time*0.9,time*0.7,time*0.35);
        drawFloor(0.06);
        scr(cx-14,cy-Math.floor(rows*0.44),"JUPITER V6 ENGINE",24,1.5,'255,255,255');
        scr(5,cy-6,"AGGREGATION ENGINE ................. ONLINE",26,1.2);
        scr(5,cy-4,"DEX SOURCES ... RAYDIUM ORCA METEORA LIFINITY",28,1.2);
        scr(5,cy-2,"ROUTE OPTIMIZATION ............. BEST PATH",30,1.0);
        scr(5,cy+0,"EXECUTION SPEED ................ <400ms",32,1.0);
        scr(5,cy+2,"SLIPPAGE PROTECTION ............ ACTIVE",34,1.0);
        counter(5,cy+4,"POOLS SCANNED: ",2847,26);
        sn('k',24,ping);sn('l',26,ping);sn('m',28,ping);sn('n',30,ping);sn('o',32,ping);sn('o2',34,ping);
    }
    // 3: SPHERE / SWAP (36-45)
    else if(time<45){
        if(phase!==3){phase=3;tSphere();impact();addSW();}
        camZoom=550;
        updateP(time*0.4,time*0.7,0);
        scr(cx-12,cy-Math.floor(rows*0.44),"SWAP  ANY  TOKEN",37,1.5,'255,255,255');
        scr(cols-40,cy-4,"> 1,000+ SOLANA TOKENS",38,1.0);
        scr(cols-40,cy-2,"> INSTANT EXECUTION",39,1.0);
        scr(cols-40,cy+0,"> DEEPEST LIQUIDITY",40,1.0);
        scr(cols-40,cy+2,"> REAL-TIME PRICE FEEDS",41,1.0);
        scr(cols-40,cy+4,"> ZERO SLIPPAGE RISK",42,1.0);
        counter(cols-40,cy+6,"TOKENS AVAILABLE: ",1247,38);
        sn('p',37,ping);sn('q',39,ping);sn('r',41,ping);sn('s',42,ping);
    }
    // 4: MOBIUS / LIMIT (45-56)
    else if(time<56){
        if(phase!==4){phase=4;tMobius();impact();addSW();}
        camZoom=500;
        updateP(time*0.5,time*0.8,time*0.3);
        scr(cx-14,cy-Math.floor(rows*0.44),"ON-CHAIN LIMIT ORDERS",47,1.5,'255,255,255');
        scr(cx-18,cy+Math.floor(rows*0.22),"SET YOUR TARGET PRICE.",49,1.0);
        scr(cx-18,cy+Math.floor(rows*0.22)+2,"WALK AWAY. IT EXECUTES.",50,1.0);
        scr(cx-18,cy+Math.floor(rows*0.22)+4,"AUTOMATICALLY. ON-CHAIN.",51,1.0);
        scr(cx-18,cy+Math.floor(rows*0.22)+7,"DOLLAR-COST AVERAGING",53,1.2);
        scr(cx-18,cy+Math.floor(rows*0.22)+9,"BUILD POSITIONS. ANY INTERVAL.",54,1.0);
        sn('t',47,ping);sn('u',49,ping);sn('u2',51,ping);sn('v',53,ping);sn('w',54,ping);
    }
    // 5: DIAMOND / SECURITY (56-66)
    else if(time<66){
        if(phase!==5){phase=5;tDiamond();impact();addSW();}
        camZoom=550;
        updateP(time*0.7,time*1.1,0);
        scr(cx-18,cy-Math.floor(rows*0.44),"NON-CUSTODIAL. ALWAYS.",58,1.5,'255,255,255');
        scr(cx-19,cy+Math.floor(rows*0.18),"YOUR KEYS. YOUR COINS.",61,1.0);
        scr(cx-19,cy+Math.floor(rows*0.18)+2,"TRADE FROM YOUR OWN WALLET.",63,1.0);
        scr(cx-19,cy+Math.floor(rows*0.18)+4,"PHANTOM. SOLFLARE. ANY WALLET.",65,1.0);
        sn('x',58,ping);sn('y',61,ping);sn('z',63,ping);sn('z2',65,ping);
    }
    // 6: WAVE / SECURITY (66-76)
    else if(time<76){
        if(phase!==6){phase=6;tWave();impact();addSW();}
        camZoom=500;
        updateP(0.45,time*0.06,0);
        drawFloor(0.04);
        scr(cx-12,cy-Math.floor(rows*0.44),"THE SHX ECOSYSTEM",68,1.2,'255,255,255');
        scr(cx-20,cy+Math.floor(rows*0.16),"> LIVE ANALYTICS DASHBOARD",69,1.0);
        scr(cx-20,cy+Math.floor(rows*0.16)+2,"> REAL-TIME FEE TRACKING",70,1.0);
        scr(cx-20,cy+Math.floor(rows*0.16)+4,"> MOBILE-FIRST PWA",71,1.0);
        scr(cx-20,cy+Math.floor(rows*0.16)+6,"> AI-POWERED TRADING AGENT",72,1.0);
        scr(cx-20,cy+Math.floor(rows*0.16)+8,"> FIAT ON-RAMP (MOONPAY)",73,1.0);
        scr(cx-20,cy+Math.floor(rows*0.16)+10,"> PRO TERMINAL + LIVE CHARTS",74,1.0);
        scr(cx-20,cy+Math.floor(rows*0.16)+12,"> COMPREHENSIVE TOKEN SEARCH",75,1.0);
        sn('A',68,ping);sn('B',70,ping);sn('C',72,ping);sn('D',74,ping);sn('E',75,ping);
    }
    // 7: RING ORBIT (76-82)
    else if(time<82){
        if(phase!==7){phase=7;tRing();impact();addSW();}
        camZoom=600;
        updateP(0,time*0.2,time*0.5);
        scr(cx-18,cy-3,"NO DEPOSITS. NO WITHDRAWALS.",78,1.5,'255,255,255');
        scr(cx-11,cy+0,"NO MIDDLEMEN.",79,1.0,'255,255,255');
        scr(cx-5,cy+3,"EVER.",80,0.6,'255,255,255');
        sn('F',78,ping);sn('G',80,ping);
    }
    // 8: WARP (82-88)
    else if(time<88){
        if(phase!==8){phase=8;tWarp();impact();riser(5.5);}
        camZoom=550;
        updateP(0,0,0);
        // Speed lines
        for(let i=0;i<80;i++){
            let sx=(Math.sin(i*47.3)*0.5+0.5)*cols;
            let sy=(Math.cos(i*31.7)*0.5+0.5)*rows;
            let len=5+Math.floor(time-82)*4;
            for(let l=0;l<len;l++){let px=sx+l;if(px<cols&&sy>=0&&sy<rows)p3(px,sy,500,'>',0.3*(1-l/len));}
        }
        if(time>85)scr(cx-16,cy,"ENTERING  THE  NEXT  ERA...",85,2.5,'255,255,255');
        if(time>87){trigGlitch();screenPulse=1.5;}
    }
    // 9: LOGO (88+)
    else{
        if(phase!==9){phase=9;tLogo();megaImpact();addSW();chord();}
        let lt=time-88;
        camZoom=550+Math.sin(lt*0.2)*30;
        updateP(Math.sin(lt*0.15)*0.06,lt*0.06,0);

        // Direct logo render with row-by-row reveal
        if(lt>1){
            let revealedRows=Math.min(Math.floor((lt-1)*4),LOGO.length);
            let pulse=Math.sin(time*3)*0.15+0.85;
            let lx=cx-Math.floor(LOGO[0].length/2);
            let ly=cy-LOGO.length-1;
            for(let r=0;r<revealedRows;r++){
                for(let c=0;c<LOGO[r].length;c++){
                    if(LOGO[r][c]==='#'){
                        let px=lx+c,py=ly+r;
                        if(px>=0&&px<cols&&py>=0&&py<rows){
                            let idx=py*cols+px;zB[idx]=-500;grid[idx].c='#';grid[idx].o=pulse;grid[idx].co='255,255,255';
                        }
                        // Glow halo
                        for(let dx=-1;dx<=1;dx++){for(let dy=-1;dy<=1;dy++){
                            if(!dx&&!dy)continue;
                            let gx=px+dx,gy=py+dy;
                            if(gx>=0&&gx<cols&&gy>=0&&gy<rows){let gi=gy*cols+gx;if(zB[gi]>-400){zB[gi]=-400;grid[gi].c='.';grid[gi].o=pulse*0.3;grid[gi].co=null;}}
                        }}
                    }
                }
                if(r===0&&lt<1.3)sn('row0',88.1,ping);
            }
        }

        // Text sequence
        if(lt>3.5){let s="S H U L E V I T Z   E X C H A N G E";scr(cx-s.length/2,cy+3,s,91.5,2,'255,255,255');}
        if(lt>6){let s="The Next Era of Digital Assets";pt(cx-s.length/2,cy+6,s,Math.sin(time*2.5)*0.15+0.85);}
        if(lt>8){let s="Built for traders. Designed for the future.";pt(cx-s.length/2,cy+8,s,0.7,'255,255,255');}
        if(lt>10.5){let s=">>> shx.exchange <<<";pt(cx-s.length/2,cy+11,s,Math.sin(time*4)*0.3+0.7);}
        sn('H',88,()=>{megaImpact();chord()});sn('I',91.5,ping);sn('J',94,ping);sn('K',96,ping);
    }

    drawGrid();
    requestAnimationFrame(render);
}

// ── GO ──
document.querySelector('.btn').addEventListener('click',()=>{
    document.getElementById('start').style.display='none';
    initA();kick();startDrone();initP();initAmb();queueV();
    resize();addEventListener('resize',resize);
    running=true;lastT=performance.now();time=0;
    requestAnimationFrame(render);
});
</script>
